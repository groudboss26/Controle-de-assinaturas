<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de Assinaturas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/styles.css" rel="stylesheet">
  </head>
  <body>
    <main class="container py-4">
      <header class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-4">
        <div>
          <p class="text-success fw-semibold mb-1">Dashboard financeiro</p>
          <h1 class="h2 mb-0">Controle de Assinaturas</h1>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-outline-success" id="chartToggleButton" type="button">Grafico</button>
          <button class="btn btn-outline-light" id="reloadButton" type="button">Atualizar</button>
        </div>
      </header>

      <section class="row g-3 mb-4" aria-label="Resumo financeiro">
        <div class="col-12 col-md-3">
          <article class="summary-card">
            <span>Assinaturas</span>
            <strong id="countValue">0</strong>
          </article>
        </div>
        <div class="col-12 col-md-3">
          <article class="summary-card">
            <span>Compartilhadas</span>
            <strong id="sharedValue">0</strong>
          </article>
        </div>
        <div class="col-12 col-md-3">
          <article class="summary-card">
            <span>Custo mensal</span>
            <strong id="monthlyValue">R$ 0,00</strong>
          </article>
        </div>
        <div class="col-12 col-md-3">
          <article class="summary-card">
            <span>Custo anual</span>
            <strong id="annualValue">R$ 0,00</strong>
          </article>
        </div>
      </section>

      <div id="alertArea" aria-live="polite"></div>

      <section class="panel mb-4" id="chartPanel" hidden>
        <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
          <h2 class="h5 mb-0">Custos por assinatura</h2>
          <span class="badge text-bg-success">Mensal x anual</span>
        </div>
        <div class="chart-shell">
          <canvas id="costChart" height="260" aria-label="Grafico de barras com custos mensal e anual por assinatura"></canvas>
        </div>
      </section>

      <section class="row g-4">
        <div class="col-12 col-lg-4">
          <form id="subscriptionForm" class="panel" autocomplete="off">
            <h2 class="h5 mb-3" id="formTitle">Nova assinatura</h2>
            <input type="hidden" id="subscriptionId">

            <div class="mb-3">
              <label class="form-label" for="name">Nome</label>
              <input class="form-control" id="name" name="name" maxlength="120" autocomplete="off" required>
            </div>

            <div class="row g-3">
              <div class="col-12 col-sm-6">
                <label class="form-label" for="price">Preco total</label>
                <input class="form-control" id="price" name="price" min="0.01" step="0.01" type="number" autocomplete="off" required>
              </div>
              <div class="col-12 col-sm-6">
                <label class="form-label" for="due_date">Vencimento</label>
                <input class="form-control" id="due_date" name="due_date" type="date" autocomplete="off" required>
              </div>
            </div>

            <div class="mb-3 mt-3">
              <label class="form-label" for="period">Periodo</label>
              <select class="form-select" id="period" name="period" autocomplete="off" required>
                <option value="monthly">Mensal</option>
                <option value="yearly">Anual</option>
                <option value="weekly">Semanal</option>
              </select>
            </div>

            <div class="form-check form-switch mb-3">
              <input class="form-check-input" id="shared" name="shared" type="checkbox" autocomplete="off">
              <label class="form-check-label" for="shared">Assinatura compartilhada</label>
            </div>

            <div class="mb-3" id="shareGroup">
              <label class="form-label" for="my_share">Minha parte</label>
              <input class="form-control" id="my_share" name="my_share" min="0.01" step="0.01" type="number" autocomplete="off">
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-success fw-semibold" type="submit">Salvar</button>
              <button class="btn btn-outline-light" id="cancelEditButton" type="button">Cancelar edicao</button>
            </div>
          </form>
        </div>

        <div class="col-12 col-lg-8">
          <section class="panel">
            <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
              <h2 class="h5 mb-0">Assinaturas cadastradas</h2>
              <span class="badge text-bg-warning" id="nextDueValue">Sem vencimentos</span>
            </div>
            <div class="table-responsive">
              <table class="table table-dark table-hover align-middle mb-0">
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>Status</th>
                    <th>Preco</th>
                    <th>Minha parte</th>
                    <th>Vencimento</th>
                    <th>Periodo</th>
                    <th class="text-end">Acoes</th>
                  </tr>
                </thead>
                <tbody id="subscriptionsTable"></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
